services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1  
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/siteshield.db
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      SCAN_INTERVAL_SECONDS: "120"
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/siteshield.db
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/siteshield.db
      SCAN_INTERVAL_SECONDS: "120"
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
