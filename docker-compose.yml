services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siteshield
      POSTGRES_PASSWORD: siteshield_dev_pw
      POSTGRES_DB: siteshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteshield"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://siteshield:siteshield_dev_pw@postgres:5432/siteshield
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      SCAN_INTERVAL_SECONDS: "120"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://siteshield:siteshield_dev_pw@postgres:5432/siteshield
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://siteshield:siteshield_dev_pw@postgres:5432/siteshield
      SCAN_INTERVAL_SECONDS: "120"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: